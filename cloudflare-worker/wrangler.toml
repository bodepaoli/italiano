name = "italiano-sync"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Replace id below with the ID printed by `wrangler kv namespace create KNOWN`
[[kv_namespaces]]
binding = "KNOWN"
id = "ebc2a1979ed04d1eb106b2fa785b1967"

[ai]
binding = "AI"

# ElevenLabs voice ID for Italian TTS. Not a secret — useless without the API key.
# To swap voices: edit this and run `wrangler deploy`. The KV cache key includes
# the voice ID, so old cached audio for the previous voice keeps working until
# its 90-day TTL expires.
[vars]
ELEVENLABS_VOICE_ID = "gfKKsLN1k0oYYN9n2dXX"
