<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Italiano">
<meta name="theme-color" content="#009246">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<title>Bo's Italian Study App</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #009246;
    --red: #CE2B37;
    --white: #FFFFFF;
    --dark: #0e1117;
    --dark2: #161b24;
    --dark3: #1e2533;
    --card: #242b3a;
    --border: #2e3a4e;
    --text: #e8eaf0;
    --muted: #8892a4;
    --accent: #f0c040;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  .nav { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--white); display: flex; align-items: center; gap: 8px; }
  .flag { display: flex; height: 20px; width: 30px; border-radius: 3px; overflow: hidden; }
  .flag-g { background: var(--green); flex: 1; }
  .flag-w { background: var(--white); flex: 1; }
  .flag-r { background: var(--red); flex: 1; }
  .nav-stats { display: flex; gap: 16px; font-size: 0.8rem; color: var(--muted); }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-num { color: var(--accent); font-weight: 600; }

  .tabs { display: flex; background: var(--dark2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 14px 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--white); border-bottom-color: var(--accent); }

  .cat-bar { display: flex; gap: 8px; padding: 16px 20px; overflow-x: auto; scrollbar-width: none; background: var(--dark); }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-pill { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; transition: all 0.2s; background: var(--dark2); }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.active { background: var(--accent); color: var(--dark); border-color: var(--accent); }

  .search-wrap { padding: 0 20px 12px; position: relative; }
  .search-input { width: 100%; background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 40px 10px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); background: var(--dark3); border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 0.85rem; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.15s; font-family: inherit; }
  .search-clear:hover { background: var(--accent); color: var(--dark); border-color: var(--accent); }
  .search-input:placeholder-shown ~ .search-clear { display: none; }

  .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 0 20px 20px; }
  .word-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }
  .word-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .word-card-it { font-size: 1.1rem; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .word-card-en { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .word-card-note { font-size: 0.75rem; color: var(--green); font-style: italic; }
  .word-card-type { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; margin-top: 6px; }

  .t-are { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .t-ere { background: rgba(0,146,70,0.15); color: #4ade80; }
  .t-ire { background: rgba(139,92,246,0.15); color: #c084fc; }
  .t-ireisc { background: rgba(240,192,64,0.15); color: var(--accent); }
  .t-irr { background: rgba(206,43,55,0.15); color: #f87171; }
  .t-phrase { background: rgba(20,184,166,0.15); color: #2dd4bf; }
  .t-adj { background: rgba(251,146,60,0.15); color: #fb923c; }
  .t-prep { background: rgba(168,85,247,0.15); color: #a78bfa; }
  .t-structure { background: rgba(236,72,153,0.15); color: #f472b6; }
  .t-think { background: rgba(14,165,233,0.15); color: #38bdf8; }

  .flashcard-wrap { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .fc-counter { font-size: 0.85rem; color: var(--muted); }
  .fc-progress { width: 100%; max-width: 500px; height: 4px; background: var(--dark3); border-radius: 2px; }
  .fc-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .flashcard { width: 100%; max-width: 500px; min-height: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; position: relative; text-align: center; }
  .flashcard:hover { border-color: var(--accent); }
  .fc-tag { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .fc-italian { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--white); line-height: 1.2; }
  .fc-english { font-size: 1.1rem; color: var(--accent); font-weight: 500; }
  .fc-note { font-size: 0.8rem; color: var(--muted); font-style: italic; max-width: 380px; }
  .fc-example { font-size: 0.85rem; color: #60a5fa; font-style: italic; border-top: 1px solid var(--border); padding-top: 12px; width: 100%; text-align: center; }
  .fc-divider { width: 40px; height: 2px; background: var(--border); border-radius: 1px; }
  .fc-nav { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .fc-btn { padding: 10px 24px; border-radius: 10px; border: 1px solid var(--border); background: var(--dark2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
  .fc-btn:hover { border-color: var(--accent); color: var(--accent); }
  .fc-btn.primary { background: var(--accent); color: var(--dark); border-color: var(--accent); font-weight: 600; }
  .fc-btn.primary:hover { opacity: 0.9; }
  .known-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(0,146,70,0.4); background: rgba(0,146,70,0.1); color: #4ade80; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .known-btn:hover { background: rgba(0,146,70,0.2); }
  .unsure-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(240,192,64,0.4); background: rgba(240,192,64,0.1); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .unsure-btn:hover { background: rgba(240,192,64,0.2); }

  .quiz-wrap { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .quiz-q { width: 100%; max-width: 560px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; text-align: center; }
  .quiz-prompt { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .quiz-word { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--white); margin-bottom: 8px; }
  .quiz-context { font-size: 0.85rem; color: var(--muted); font-style: italic; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 560px; }
  .quiz-opt { padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); transition: all 0.2s; text-align: left; }
  .quiz-opt:hover:not(.disabled) { border-color: var(--blue); color: var(--white); }
  .quiz-opt.correct { background: rgba(0,146,70,0.15); border-color: #4ade80; color: #4ade80; }
  .quiz-opt.wrong { background: rgba(206,43,55,0.15); border-color: #f87171; color: #f87171; }
  .quiz-opt.disabled { cursor: default; }
  .quiz-score { font-size: 0.85rem; color: var(--muted); }
  .quiz-result { text-align: center; padding: 24px; }
  .quiz-result-big { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--accent); }
  .quiz-result-sub { color: var(--muted); margin-top: 8px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--dark2); border: 1px solid var(--border); border-radius: 20px; padding: 28px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal.wide { max-width: 780px; }
  .modal-it { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--white); margin-bottom: 6px; }
  .modal-en { font-size: 1rem; color: var(--accent); margin-bottom: 16px; }
  .modal-section { margin-bottom: 14px; }
  .modal-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .modal-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; }
  .modal-ex { font-size: 0.85rem; color: #60a5fa; font-style: italic; padding: 8px 12px; background: rgba(59,130,246,0.08); border-radius: 8px; margin-bottom: 6px; }
  .modal-close { width: 100%; margin-top: 16px; padding: 10px; background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  .tense-grid-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--dark3); -webkit-overflow-scrolling: touch; }
  .tense-grid-wrap::-webkit-scrollbar { height: 6px; }
  .tense-grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .tense-grid { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: max-content; }
  .tense-grid th { color: var(--accent); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--dark2); text-align: left; white-space: nowrap; position: sticky; top: 0; }
  .tense-grid td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; white-space: nowrap; }
  .tense-grid tr:last-child td { border-bottom: none; }
  .tg-pronoun { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; background: var(--dark2); position: sticky; left: 0; border-right: 1px solid var(--border); }
  .tg-form { color: var(--white); font-family: 'Playfair Display', serif; font-weight: 500; }
  .tense-hint { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-top: 6px; padding: 0 4px; }
  .ex-list { display: flex; flex-direction: column; gap: 8px; }
  .ex-row { display: grid; grid-template-columns: 90px 1fr; gap: 10px 14px; align-items: baseline; padding: 8px 12px; background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; }
  .ex-label { color: var(--accent); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .ex-italian { color: var(--white); font-family: 'Playfair Display', serif; font-size: 0.95rem; font-style: italic; }
  .ex-english { color: var(--muted); font-size: 0.82rem; grid-column: 2; margin-top: 2px; }
  mark { background: rgba(240,192,64,0.85); color: var(--dark); border-radius: 3px; padding: 0 3px; font-weight: 600; }
  @media (max-width: 480px) {
    .ex-row { grid-template-columns: 1fr; gap: 2px; }
    .ex-english { grid-column: 1; }
  }
  .pattern-words { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin-top: 4px; }
  .pattern-word { padding: 6px 10px; background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; display: flex; justify-content: space-between; gap: 8px; }
  .pattern-word-it { color: var(--white); font-weight: 500; }
  .pattern-word-en { color: var(--muted); font-size: 0.75rem; }
  @media (max-width: 480px) { .pattern-words { grid-template-columns: 1fr; } }
  .fc-words { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
  .fc-word-chip { padding: 4px 10px; background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; font-size: 0.75rem; color: var(--text); }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-big { font-size: 3rem; margin-bottom: 12px; }

  .section-header { padding: 20px 20px 12px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--white); }
  .section-count { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  /* CHEAT SHEETS */
  .cs-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; }
  .cs-card { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.2s; }
  .cs-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cs-card-icon { font-size: 1.8rem; width: 44px; height: 44px; background: var(--dark3); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cs-card-body { flex: 1; min-width: 0; }
  .cs-card-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--white); margin-bottom: 2px; }
  .cs-card-sub { font-size: 0.82rem; color: var(--muted); }
  .cs-card-arrow { color: var(--muted); font-size: 1.2rem; flex-shrink: 0; }

  .cs-sheet { max-width: 780px; margin: 0 auto; padding: 20px; }
  .cs-back { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 8px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: all 0.15s; }
  .cs-back:hover { border-color: var(--accent); color: var(--accent); }
  .cs-sheet-head { display: flex; gap: 16px; align-items: center; margin: 20px 0 8px; padding-bottom: 18px; border-bottom: 2px solid var(--border); }
  .cs-sheet-icon { font-size: 2.4rem; width: 64px; height: 64px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cs-sheet-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--white); line-height: 1.1; margin-bottom: 4px; }
  .cs-sheet-sub { color: var(--muted); font-size: 0.9rem; }

  .cs-body { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px 22px 4px; }
  .cs-h { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1.15rem; margin: 18px 0 10px; }
  .cs-h:first-child { margin-top: 2px; }
  .cs-p { color: var(--text); font-size: 0.92rem; line-height: 1.55; margin-bottom: 12px; }
  .cs-rule { background: rgba(240,192,64,0.08); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 8px 8px 0; color: var(--text); font-size: 0.88rem; line-height: 1.5; margin: 10px 0 16px; }
  .cs-ex { background: rgba(59,130,246,0.08); border-left: 3px solid var(--blue); padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0 16px; display: flex; flex-direction: column; gap: 4px; }
  .cs-ex-it { color: #93c5fd; font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic; }
  .cs-ex-en { color: var(--muted); font-size: 0.85rem; }

  .cs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin: 4px 0 16px; }
  .cs-gi { background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .cs-gi-a { color: var(--white); font-weight: 500; font-size: 0.9rem; }
  .cs-gi-b { color: var(--muted); font-size: 0.78rem; text-align: right; }

  .cs-tbl-wrap { overflow-x: auto; margin: 4px 0 18px; border-radius: 10px; border: 1px solid var(--border); }
  .cs-tbl { width: 100%; border-collapse: collapse; font-size: 0.88rem; background: var(--dark3); }
  .cs-tbl th { background: var(--dark2); color: var(--accent); text-align: left; padding: 10px 12px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); }
  .cs-tbl td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
  .cs-tbl tr:last-child td { border-bottom: none; }

  @media (max-width: 480px) {
    .quiz-options { grid-template-columns: 1fr; }
    .fc-italian { font-size: 1.6rem; }
    .browse-grid { grid-template-columns: 1fr; }
    .cs-grid { grid-template-columns: 1fr; }
    .cs-sheet-head { gap: 12px; }
    .cs-sheet-icon { width: 52px; height: 52px; font-size: 2rem; }
    .cs-sheet-title { font-size: 1.3rem; }
    .cs-body { padding: 18px 16px 4px; }
    .cs-tbl { font-size: 0.82rem; }
    .cs-tbl th, .cs-tbl td { padding: 7px 9px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="flag"><div class="flag-g"></div><div class="flag-w"></div><div class="flag-r"></div></div>
    Bo's Italian
  </div>
  <div class="nav-stats">
    <div class="stat">Known: <span class="stat-num" id="known-count">0</span></div>
    <div class="stat">Cards: <span class="stat-num" id="total-count">0</span></div>
  </div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="setTab('browse')">📚 Browse</div>
  <div class="tab" onclick="setTab('flashcard')">🃏 Flashcards</div>
  <div class="tab" onclick="setTab('quiz')">🎯 Quiz</div>
  <div class="tab" onclick="setTab('cheat')">📋 Cheat Sheets</div>
</div>

<div id="app"></div>
<div id="modal"></div>

<script src="vocab.js"></script>
<script src="cheatsheets.js"></script>
<script>
const DATA = VOCAB;

let currentTab = 'browse';
let currentCat = 'All';
let searchTerm = '';
let fcIndex = 0;
let fcItems = [];
let fcSeeded = false;
let knownWords = new Set(JSON.parse(localStorage.getItem('known') || '[]'));
let quizItems = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;
let selectedModal = null;
let activeTense = 'pres';
let activeCheat = null;

const TENSE_META = {
  pres:   { label: 'Presente',    hint: 'what happens right now' },
  past:   { label: 'Passato',     hint: "passato prossimo — 'I did / I have done'" },
  imperf: { label: 'Imperfetto',  hint: "imperfect past — 'I used to / I was doing'" },
  fut:    { label: 'Futuro',      hint: "simple future — 'I will'" },
  cond:   { label: 'Condizionale',hint: "conditional — 'I would'" },
};
const PRONOUNS = ['io','tu','lui / lei','noi','voi','loro'];

function setTense(t) {
  activeTense = t;
  renderModal();
}

function renderExamples(examples) {
  const labels = ['Presente','Passato','Imperfetto','Futuro','Condizionale'];
  return `
    <div class="modal-section">
      <div class="modal-label">Examples</div>
      <div class="ex-list">
        ${examples.map((ex, i) => `
          <div class="ex-row">
            <div class="ex-label">${labels[i]}</div>
            <div class="ex-italian">${hl(ex.it)}</div>
            <div class="ex-english">${hl(ex.en)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderTenses(tenses, modalIdx) {
  const order = ['pres','past','imperf','fut','cond'];
  const active = order.filter(t => tenses[t]);
  const headerRow = '<tr><th></th>' + active.map(t => `<th>${TENSE_META[t].label}</th>`).join('') + '</tr>';
  const bodyRows = PRONOUNS.map((pronoun, i) =>
    `<tr><td class="tg-pronoun">${pronoun}</td>` +
    active.map(t => `<td class="tg-form">${hl(tenses[t][i] || '')}</td>`).join('') +
    '</tr>'
  ).join('');
  return `
    <div class="modal-section">
      <div class="modal-label">All tenses</div>
      <div class="tense-grid-wrap">
        <table class="tense-grid">
          ${headerRow}
          ${bodyRows}
        </table>
      </div>
      <div class="tense-hint">presente · passato prossimo · imperfetto · futuro semplice · condizionale</div>
    </div>
  `;
}

const CATS = ['All', 'Verbs', 'Phrases', 'Structure', 'Nouns', 'Adjectives', 'Colors', 'Prepositions', 'Articles', 'Numbers', 'Time', 'Directions', 'Restaurant', 'Past Tense', 'Itangliano', 'Tricky Pairs', 'Word Patterns', 'FARE Expressions'];

function saveKnown() {
  localStorage.setItem('known', JSON.stringify([...knownWords]));
  document.getElementById('known-count').textContent = knownWords.size;
}

const LEADING_ARTICLES = ["il ","lo ","la ","l'","i ","gli ","le ","un ","uno ","una ","un'"];
function sortKey(s) {
  let k = s.toLowerCase().trim();
  for (const a of LEADING_ARTICLES) {
    if (k.startsWith(a)) { k = k.slice(a.length); break; }
  }
  return k;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function hl(text) {
  // Highlight current searchTerm matches inside `text`. Always returns HTML-safe string.
  const escaped = escapeHtml(text);
  if (!searchTerm) return escaped;
  const safe = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function matchesEntry(d, s) {
  if (d.it.toLowerCase().includes(s)) return true;
  if (d.en.toLowerCase().includes(s)) return true;
  if ((d.note || '').toLowerCase().includes(s)) return true;
  if ((d.ex || '').toLowerCase().includes(s)) return true;
  if ((d.aliases || '').toLowerCase().includes(s)) return true;
  // Conjugated forms across all 5 tenses
  if (d.tenses) {
    for (const t of ['pres','past','imperf','fut','cond']) {
      if (d.tenses[t] && d.tenses[t].some(f => f.toLowerCase().includes(s))) return true;
    }
  }
  // Auto-generated example sentences (Italian + English per tense)
  if (d.examples && d.examples.some(e => e.it.toLowerCase().includes(s) || e.en.toLowerCase().includes(s))) return true;
  // Pattern nested word lists (e.g. -tion → -zione contains "nazione")
  if (d.words && d.words.some(w => w.it.toLowerCase().includes(s) || w.en.toLowerCase().includes(s))) return true;
  return false;
}

function getFiltered() {
  let items = DATA;
  if (currentCat !== 'All') items = items.filter(d => d.cat === currentCat);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    items = items.filter(d => matchesEntry(d, s));
  }
  return items.slice().sort((a, b) => sortKey(a.it).localeCompare(sortKey(b.it), 'it'));
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['browse','flashcard','quiz','cheat'][i] === tab);
  });
  if (tab === 'flashcard') {
    fcItems = getFiltered().sort(() => Math.random() - 0.5);
    fcSeeded = true;
    fcIndex = 0;
  }
  if (tab === 'quiz') {
    startQuiz();
  }
  if (tab === 'cheat') {
    activeCheat = null;
  }
  render();
}

function setCat(cat) {
  currentCat = cat;
  if (currentTab === 'flashcard') {
    fcItems = getFiltered().sort(() => Math.random() - 0.5);
    fcSeeded = true;
    fcIndex = 0;
  }
  render();
}

function renderBrowse() {
  const items = getFiltered();
  return `
    <div class="cat-bar">${CATS.map(c=>`<div class="cat-pill${currentCat===c?' active':''}" onclick="setCat('${c}')">${c} ${c==='All'?'('+DATA.length+')':''}</div>`).join('')}</div>
    <div class="search-wrap">
      <input class="search-input" placeholder="🔍 Search Italian or English..." value="${searchTerm}" oninput="handleSearch(this.value)" />
      <button class="search-clear" onclick="clearSearch()" aria-label="Clear search">×</button>
    </div>
    <div class="section-header">
      <div class="section-title">${currentCat === 'All' ? 'All Vocabulary' : currentCat}</div>
      <div class="section-count">${items.length} items</div>
    </div>
    ${items.length === 0 ? '<div class="empty"><div class="empty-big">🤷</div>No results found.</div>' : ''}
    <div class="browse-grid">
      ${items.map(d => `
        <div class="word-card${knownWords.has(d.it)?' known':''}" onclick="openModal(${DATA.indexOf(d)})">
          <div class="word-card-it">${hl(d.it)}</div>
          <div class="word-card-en">${hl(d.en)}</div>
          ${d.note ? `<div class="word-card-note">${hl(d.note.length > 60 ? d.note.substring(0,60)+'...' : d.note)}</div>` : ''}
          <span class="word-card-type ${d.type}">${d.cat}</span>
          ${knownWords.has(d.it) ? '<span style="float:right;font-size:1rem">✓</span>' : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderFlashcard() {
  if (!fcSeeded || fcItems.length === 0) {
    fcItems = getFiltered().sort(() => Math.random() - 0.5);
    fcSeeded = true;
  }
  const item = fcItems[fcIndex];
  if (!item) return '<div class="empty"><div class="empty-big">🎉</div><p>All done! Great work Bo!</p></div>';
  const pct = ((fcIndex) / fcItems.length * 100).toFixed(0);
  return `
    <div class="cat-bar">${CATS.map(c=>`<div class="cat-pill${currentCat===c?' active':''}" onclick="setCat('${c}')">${c}</div>`).join('')}</div>
    <div class="flashcard-wrap">
      <div class="fc-counter">${fcIndex + 1} / ${fcItems.length}</div>
      <div class="fc-progress"><div class="fc-progress-bar" style="width:${pct}%"></div></div>
      <div class="flashcard">
        <div class="fc-tag">${item.cat}</div>
        <div class="fc-italian">${item.it}</div>
        <div class="fc-divider"></div>
        <div class="fc-english">${item.en}</div>
        ${item.note ? `<div class="fc-note">💡 ${item.note}</div>` : ''}
        ${item.words && item.words.length ? `<div class="fc-words">${item.words.slice(0,10).map(w=>`<span class="fc-word-chip">${w.it}</span>`).join('')}${item.words.length>10?`<span class="fc-word-chip" style="color:var(--muted)">+${item.words.length-10} more</span>`:''}</div>` : ''}
        ${item.ex ? `<div class="fc-example">💬 ${item.ex}</div>` : ''}
      </div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="if(fcIndex>0){fcIndex--;render()}">← Prev</button>
        <button class="${knownWords.has(item.it)?'unsure-btn':'known-btn'}" onclick="toggleKnown(${DATA.indexOf(item)})">
          ${knownWords.has(item.it) ? '↩ Unmark' : '✓ I know this!'}
        </button>
        <button class="fc-btn primary" onclick="fcIndex++;render()">Next →</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="fc-btn" onclick="fcItems=getFiltered().sort(()=>Math.random()-0.5);fcSeeded=true;fcIndex=0;render()" style="font-size:0.8rem">🔀 Shuffle</button>
        <button class="fc-btn" onclick="fcItems=getFiltered().filter(d=>!knownWords.has(d.it)).sort(()=>Math.random()-0.5);fcSeeded=true;fcIndex=0;render()" style="font-size:0.8rem">⭐ Unknown only</button>
      </div>
    </div>
  `;
}

function toggleKnown(idx) {
  const it = DATA[idx].it;
  if (knownWords.has(it)) knownWords.delete(it);
  else knownWords.add(it);
  saveKnown();
  render();
}

function startQuiz() {
  quizItems = getFiltered().sort(() => Math.random() - 0.5).slice(0, 20);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
}

function renderQuiz() {
  if (quizItems.length === 0) { startQuiz(); }
  if (quizIndex >= quizItems.length) {
    const pct = Math.round(quizScore / quizItems.length * 100);
    return `
      <div class="cat-bar">${CATS.map(c=>`<div class="cat-pill${currentCat===c?' active':''}" onclick="setCat('${c}');startQuiz();render()">${c}</div>`).join('')}</div>
      <div class="quiz-wrap">
        <div class="quiz-result">
          <div class="quiz-result-big">${pct}%</div>
          <div style="font-size:1.5rem;margin:8px">${pct>=80?'🎉 Eccellente!':pct>=60?'👍 Bene!':'📚 Keep practicing!'}</div>
          <div class="quiz-result-sub">${quizScore} / ${quizItems.length} correct</div>
          <br>
          <button class="fc-btn primary" onclick="startQuiz();render()" style="margin-top:16px">Play again 🔄</button>
        </div>
      </div>
    `;
  }
  const item = quizItems[quizIndex];
  const pool = DATA.filter(d => d.en !== item.en);
  const wrongs = pool.sort(() => Math.random() - 0.5).slice(0, 3).map(d => d.en);
  const options = [...wrongs, item.en].sort(() => Math.random() - 0.5);
  const pct = (quizIndex / quizItems.length * 100).toFixed(0);
  // Stash options for click handler (avoid string-escaping answers in HTML)
  window._quizOpts = options;
  window._quizAnswer = item.en;
  return `
    <div class="cat-bar">${CATS.map(c=>`<div class="cat-pill${currentCat===c?' active':''}" onclick="setCat('${c}');startQuiz();render()">${c}</div>`).join('')}</div>
    <div class="quiz-wrap">
      <div class="quiz-score">Question ${quizIndex+1}/${quizItems.length} — Score: ${quizScore}</div>
      <div class="fc-progress" style="width:100%;max-width:560px"><div class="fc-progress-bar" style="width:${pct}%"></div></div>
      <div class="quiz-q">
        <div class="quiz-prompt">What does this mean in English?</div>
        <div class="quiz-word">${item.it}</div>
        ${item.cat ? `<div class="quiz-context">${item.cat}</div>` : ''}
      </div>
      <div class="quiz-options">
        ${options.map((opt, i) => `
          <button class="quiz-opt" onclick="answerQuiz(${i}, this)">${opt}</button>
        `).join('')}
      </div>
      ${quizAnswered ? `<button class="fc-btn primary" onclick="quizIndex++;quizAnswered=false;render()">Next →</button>` : ''}
    </div>
  `;
}

function answerQuiz(i, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const chosen = window._quizOpts[i];
  const correct = window._quizAnswer;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.classList.add('disabled');
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
  }
  render();
}

function openCheat(id) {
  activeCheat = id;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function closeCheat() {
  activeCheat = null;
  render();
  window.scrollTo({top:0});
}

function fmtInline(s) {
  // Bold markdown: **text** → <strong>
  return String(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

function renderCheatSection(s) {
  if (s.type === 'heading')   return `<h3 class="cs-h">${fmtInline(s.text)}</h3>`;
  if (s.type === 'paragraph') return `<p class="cs-p">${fmtInline(s.text)}</p>`;
  if (s.type === 'rule')      return `<div class="cs-rule">${fmtInline(s.text)}</div>`;
  if (s.type === 'example')   return `<div class="cs-ex"><span class="cs-ex-it">${fmtInline(s.it)}</span><span class="cs-ex-en">${fmtInline(s.en)}</span></div>`;
  if (s.type === 'grid') {
    return `<div class="cs-grid">${s.items.map(([a,b]) => `<div class="cs-gi"><span class="cs-gi-a">${fmtInline(a)}</span><span class="cs-gi-b">${fmtInline(b)}</span></div>`).join('')}</div>`;
  }
  if (s.type === 'table') {
    const head = `<tr>${s.headers.map(h => `<th>${fmtInline(h)}</th>`).join('')}</tr>`;
    const body = s.rows.map(r => `<tr>${r.map(c => `<td>${fmtInline(c)}</td>`).join('')}</tr>`).join('');
    return `<div class="cs-tbl-wrap"><table class="cs-tbl">${head}${body}</table></div>`;
  }
  return '';
}

function renderCheat() {
  if (!activeCheat) {
    // Index / table of contents
    return `
      <div class="cs-index">
        <div class="section-header">
          <div class="section-title">Cheat Sheets</div>
          <div class="section-count">${CHEATSHEETS.length} printable-style reference sheets</div>
        </div>
        <div class="cs-list">
          ${CHEATSHEETS.map(cs => `
            <div class="cs-card" onclick="openCheat('${cs.id}')">
              <div class="cs-card-icon">${cs.icon}</div>
              <div class="cs-card-body">
                <div class="cs-card-title">${cs.title}</div>
                <div class="cs-card-sub">${cs.subtitle}</div>
              </div>
              <div class="cs-card-arrow">→</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  const cs = CHEATSHEETS.find(x => x.id === activeCheat);
  if (!cs) { activeCheat = null; return renderCheat(); }
  return `
    <div class="cs-sheet">
      <button class="cs-back" onclick="closeCheat()">← All cheat sheets</button>
      <div class="cs-sheet-head">
        <div class="cs-sheet-icon">${cs.icon}</div>
        <div>
          <div class="cs-sheet-title">${cs.title}</div>
          <div class="cs-sheet-sub">${cs.subtitle}</div>
        </div>
      </div>
      <div class="cs-body">
        ${cs.sections.map(renderCheatSection).join('')}
      </div>
      <button class="cs-back" onclick="closeCheat()" style="margin-top:24px">← Back to all sheets</button>
    </div>
  `;
}

function openModal(idx) {
  selectedModal = idx;
  activeTense = 'pres';
  renderModal();
}

function renderModal() {
  if (selectedModal === null) { document.getElementById('modal').innerHTML = ''; return; }
  const d = DATA[selectedModal];
  document.getElementById('modal').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this){selectedModal=null;renderModal()}">
      <div class="modal${d.tenses ? ' wide' : ''}">
        <div class="modal-it">${hl(d.it)}</div>
        <div class="modal-en">${hl(d.en)}</div>
        <span class="word-card-type ${d.type}" style="margin-bottom:16px;display:inline-block">${d.cat}</span>
        ${d.note ? `
          <div class="modal-section">
            <div class="modal-label">Notes / Grammar</div>
            <div class="modal-text">${hl(d.note)}</div>
          </div>
        ` : ''}
        ${d.ex ? `
          <div class="modal-section">
            <div class="modal-label">Example</div>
            <div class="modal-ex">${hl(d.ex)}</div>
          </div>
        ` : ''}
        ${d.words && d.words.length ? `
          <div class="modal-section">
            <div class="modal-label">Common A1–A2 words (${d.words.length})</div>
            <div class="pattern-words">
              ${d.words.map(w => `<div class="pattern-word"><span class="pattern-word-it">${hl(w.it)}</span><span class="pattern-word-en">${hl(w.en)}</span></div>`).join('')}
            </div>
          </div>
        ` : ''}
        ${d.tenses ? renderTenses(d.tenses, selectedModal) : ''}
        ${d.examples ? renderExamples(d.examples) : ''}
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="${knownWords.has(d.it)?'unsure-btn':'known-btn'}" style="flex:1" onclick="toggleKnown(${selectedModal});renderModal()">
            ${knownWords.has(d.it) ? '↩ Unmark' : '✓ Mark as known'}
          </button>
          <button class="modal-close" style="flex:1;margin:0" onclick="selectedModal=null;renderModal()">Close</button>
        </div>
      </div>
    </div>
  `;
}

function clearSearch() {
  searchTerm = '';
  render();
  const el = document.querySelector('.search-input');
  if (el) el.focus();
}

function handleSearch(val) {
  searchTerm = val;
  const items = getFiltered();
  const grid = document.querySelector('.browse-grid');
  const count = document.querySelector('.section-count');
  if (grid) {
    grid.innerHTML = items.length === 0
      ? '<div class="empty"><div class="empty-big">🤷</div>No results found.</div>'
      : items.map(d => `
        <div class="word-card${knownWords.has(d.it)?' known':''}" onclick="openModal(${DATA.indexOf(d)})">
          <div class="word-card-it">${hl(d.it)}</div>
          <div class="word-card-en">${hl(d.en)}</div>
          ${d.note ? `<div class="word-card-note">${hl(d.note.length > 60 ? d.note.substring(0,60)+'...' : d.note)}</div>` : ''}
          <span class="word-card-type ${d.type}">${d.cat}</span>
          ${knownWords.has(d.it) ? '<span style="float:right;font-size:1rem">✓</span>' : ''}
        </div>
      `).join('');
  }
  if (count) count.textContent = `${items.length} items`;
}

function render() {
  let html = '';
  if (currentTab === 'browse') html = renderBrowse();
  else if (currentTab === 'flashcard') html = renderFlashcard();
  else if (currentTab === 'quiz') html = renderQuiz();
  else if (currentTab === 'cheat') html = renderCheat();

  const searchEl = document.querySelector('.search-input');
  const hadFocus = searchEl && document.activeElement === searchEl;
  const cursorPos = searchEl ? searchEl.selectionStart : 0;

  document.getElementById('app').innerHTML = html;
  document.getElementById('known-count').textContent = knownWords.size;
  document.getElementById('total-count').textContent = DATA.length;

  if (hadFocus) {
    const newSearch = document.querySelector('.search-input');
    if (newSearch) {
      newSearch.focus();
      newSearch.setSelectionRange(cursorPos, cursorPos);
    }
  }
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
